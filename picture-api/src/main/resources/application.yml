# 服务器配置
server:
  port: 8123
  servlet:
    context-path: /api

# Spring框架配置
spring:
  profiles:
    active: local
  # 应用配置
  application:
    name: domye-picture-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/domye_picture?serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 10MB
  # 禁用 FormContentFilter，避免与 multipart 请求冲突
  mvc:
    formcontent:
      filter:
        enabled: false

  # Redis配置
  data:
    redis:
      database: 0
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: ""
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.domye.picture.api.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

# RocketMQ配置
rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: comment-ai-producer-group


# AI 配置 (LangChain4j)
ai:
  # OpenAI API Key（必填，支持环境变量）
  api-key: ${AI_API_KEY:}
  # API 基础 URL（可选，用于自定义 OpenAI 兼容接口，如国内代理或本地部署）
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}
  # 模型名称（可选）
  model-name: ${AI_MODEL_NAME:gpt-3.5-turbo}
  # 温度参数，控制回答的随机性（可选，0-1）
  temperature: 0.7
  # 最大 Token 数（可选）
  max-tokens: 2000
  # 请求超时时间（秒，可选）
  timeout: 60
  # Embedding 配置
  embedding:
    # Embedding 模型名称
    model-name: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    # 向量维度
    dimension: 1024

# PostgreSQL 向量存储配置 (用于 RAG)
postgres:
  vector:
    url: ${PG_VECTOR_URL:jdbc:postgresql://localhost:5432/domye_picture_vector}
    username: ${PG_VECTOR_USERNAME:postgres}
    password: ${PG_VECTOR_PASSWORD:}
    # 表名前缀
    table-prefix: picture

# S3兼容存储配置 (RustFS/MinIO等)
s3:
  client:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    accessKey: ${S3_ACCESS_KEY:}
    secretKey: ${S3_SECRET_KEY:}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:your-bucket-name}
    host: ${S3_HOST:http://localhost:9000/your-bucket-name}
    pathStyleAccess: true
