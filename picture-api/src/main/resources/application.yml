# 服务器配置
server:
  port: 8123
  servlet:
    context-path: /api

# Spring框架配置
spring:
  profiles:
    active: local
  # 应用配置
  application:
    name: domye-picture-backend

  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    # 基线迁移（用于已有数据库）
    baseline-on-migrate: true
    baseline-version: 1.0.0
    # 迁移脚本位置
    locations: classpath:db/migration
    # 历史记录表名
    table: flyway_schema_history
    # 校验迁移脚本的校验和
    validate-on-migrate: true
    # 清理数据库（生产环境必须为 false）
    clean-disabled: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/domye_picture?serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}

  # Servlet配置
  servlet:
    multipart:
      max-file-size: 10MB
  # 禁用 FormContentFilter，避免与 multipart 请求冲突
  mvc:
    formcontent:
      filter:
        enabled: false

  # Redis配置
  data:
    redis:
      database: 0
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: ""
  global-config:
    enable-sql-runner: true
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.domye.picture.api.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

  # RabbitMQ配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 5000
    requested-heartbeat: 30
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 1
        max-concurrency: 5
        retry:
          enabled: true
          initial-interval: 1000
          multiplier: 2
          max-attempts: 3
          max-interval: 10000

# 日志配置
logging:
  level:
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR
    org.flywaydb.core.internal.database.base.Database: ERROR


# AI 配置 (LangChain4j)
ai:
  # OpenAI API Key（必填，支持环境变量）
  api-key: ${AI_API_KEY:}
  # API 基础 URL（可选，用于自定义 OpenAI 兼容接口，如国内代理或本地部署）
  base-url: ${AI_BASE_URL:https://api.openai.com/v1}
  # 模型名称（可选）
  model-name: ${AI_MODEL_NAME:gpt-3.5-turbo}
  # 温度参数，控制回答的随机性（可选，0-1）
  temperature: 0.7
  # 最大 Token 数（可选）
  max-tokens: 2000
  # 请求超时时间（秒，可选）
  timeout: 60
  # Embedding 配置
  embedding:
    # Embedding 模型名称
    model-name: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    # 向量维度
    dimension: 1024
  # 查询重写配置
  query-rewrite:
    # 是否启用查询重写
    enabled: ${AI_QUERY_REWRITE_ENABLED:true}
  # 混合检索配置
  hybrid-search:
    # 是否启用混合检索
    enabled: ${AI_HYBRID_SEARCH_ENABLED:false}
    # 向量检索权重（0-1，剩余权重给全文检索）
    vector-weight: 0.7
    # RRF 常量参数
    rrf-k: 60

# PostgreSQL 向量存储配置 (用于 RAG)
postgres:
  vector:
    url: ${PG_VECTOR_URL:jdbc:postgresql://localhost:5432/domye_picture_vector}
    username: ${PG_VECTOR_USERNAME:postgres}
    password: ${PG_VECTOR_PASSWORD:}
    # 表名前缀
    table-prefix: picture

# S3兼容存储配置 (RustFS/MinIO等)
s3:
  client:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    accessKey: ${S3_ACCESS_KEY:}
    secretKey: ${S3_SECRET_KEY:}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:your-bucket-name}
    host: ${S3_HOST:http://localhost:9000/your-bucket-name}
    pathStyleAccess: true
